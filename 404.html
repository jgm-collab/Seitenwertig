<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Seite nicht gefunden — SeitenWertig</title>
<link rel="stylesheet" href="/fonts.css"/>
<style>
:root{--bg:#080b11;--accent:#2DD4A8;--glow:rgba(45,212,168,0.2);--text:#E8E9ED;--muted:#8B8D97;--serif:'Outfit',sans-serif;--sans:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.mesh{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:.4}
.b1{width:500px;height:500px;background:radial-gradient(circle,rgba(45,212,168,0.12),transparent 70%);top:-150px;right:-100px}
.b2{width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,0.08),transparent 70%);bottom:0;left:-100px}
.wrap{position:relative;z-index:1;max-width:480px}
.num{font-family:var(--serif);font-size:clamp(80px,20vw,140px);font-weight:800;line-height:1;background:linear-gradient(135deg,var(--accent),rgba(45,212,168,0.2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
h1{font-family:var(--serif);font-size:clamp(1.4rem,4vw,2rem);font-weight:700;color:#fff;margin-bottom:12px}
p{font-size:1rem;color:var(--muted);line-height:1.65;margin-bottom:36px;font-weight:300}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#1db887);color:#080b11;font-weight:700;font-size:15px;text-decoration:none;box-shadow:0 0 28px var(--glow);transition:all .3s}
.btn:hover{box-shadow:0 0 44px rgba(45,212,168,0.35);transform:translateY(-2px)}
.links{display:flex;gap:20px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.links a{font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s}
.links a:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="mesh"><div class="blob b1"></div><div class="blob b2"></div></div>
<div class="wrap">
  <div class="num">404</div>
  <h1>Seite nicht gefunden.</h1>
  <p>Die Seite die du suchst existiert nicht oder wurde verschoben.<br>Zurück zur Startseite — da ist alles was du brauchst.</p>
  <a href="/" class="btn">Zur Startseite →</a>
  <div class="links">
    <a href="/briefing.html">Briefing starten</a>
    <a href="/aenderung.html">Änderungsauftrag</a>
    <a href="/rechtliches.html">Impressum</a>
  </div>
</div>
</body>
</html>
