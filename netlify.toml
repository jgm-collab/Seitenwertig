[[redirects]]
  from = "/briefing"
  to = "/briefing.html"
  status = 200

[[redirects]]
  from = "/aenderung"
  to = "/aenderung.html"
  status = 200

[[redirects]]
  from = "/handwerker"
  to = "/handwerker.html"
  status = 200

[[redirects]]
  from = "/gastronomie"
  to = "/gastronomie.html"
  status = 200

[[redirects]]
  from = "/dienstleister"
  to = "/dienstleister.html"
  status = 200

[[redirects]]
  from = "/rechtliches"
  to = "/rechtliches.html"
  status = 200

[[redirects]]
  from = "/agb"
  to = "/agb.html"
  status = 200

[[redirects]]
  from = "/feedback"
  to = "/feedback.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://calendly.com https://assets.calendly.com; style-src 'self' 'unsafe-inline' https://fonts.bunny.net https://assets.calendly.com; font-src 'self' https://fonts.bunny.net; img-src 'self' data: https:; connect-src 'self' https://calendly.com; frame-src https://calendly.com;"
